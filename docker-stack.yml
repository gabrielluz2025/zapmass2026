version: "3.9"

services:
  api:
    image: zapmass:latest
    build:
      context: .
      args:
        VITE_ADMIN_EMAILS: ${VITE_ADMIN_EMAILS:-}
        VITE_MARKETING_PRICE_MONTHLY: ${VITE_MARKETING_PRICE_MONTHLY:-}
        VITE_MARKETING_PRICE_ANNUAL: ${VITE_MARKETING_PRICE_ANNUAL:-}
        VITE_ENFORCE_SUBSCRIPTION: ${VITE_ENFORCE_SUBSCRIPTION:-true}
        VITE_CREATOR_STUDIO: ${VITE_CREATOR_STUDIO:-}
        VITE_GIT_REF: ${VITE_GIT_REF:-unknown}
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
    ports:
      - target: 3001
        published: ${HOST_PORT:-3001}
        protocol: tcp
        mode: host
    environment:
      NODE_ENV: production
      PORT: "3001"
      REDIS_URL: redis://redis:6379
      # monolith (default) = API + WhatsApp no mesmo processo.
      # api = API sem Chromium; requer WA_WORKER_REPLICAS>=1, Redis, e ZAPMASS_API_SESSION_MODE=api no .env da VPS.
      SESSION_PROCESS_MODE: ${ZAPMASS_API_SESSION_MODE:-monolith}
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase-admin.json
      FIREBASE_WEB_API_KEY: ${FIREBASE_WEB_API_KEY:-}
      # Mesmo valor que no frontend; no Swarm env_file não injeta — necessário no deploy. O servidor aceita esta ou FIREBASE_WEB_API_KEY.
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
      MAX_STAFF_PASSWORD_ACCOUNTS: ${MAX_STAFF_PASSWORD_ACCOUNTS:-}
      # Swarm: `env_file` não injeta como no `docker compose up`. O deploy SSH exporta MERCADOPAGO_* do .env
      # e o Compose substitui ${...} no deploy. Sem isto: "MERCADOPAGO_ACCESS_TOKEN nao configurado".
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MERCADOPAGO_BACK_URL: ${MERCADOPAGO_BACK_URL:-}
      MERCADOPAGO_PRICE_MONTHLY: ${MERCADOPAGO_PRICE_MONTHLY:-}
      MERCADOPAGO_PRICE_ANNUAL: ${MERCADOPAGO_PRICE_ANNUAL:-}
      MERCADOPAGO_CHANNEL_TIER_1: ${MERCADOPAGO_CHANNEL_TIER_1:-}
      MERCADOPAGO_CHANNEL_TIER_2: ${MERCADOPAGO_CHANNEL_TIER_2:-}
      MERCADOPAGO_CHANNEL_TIER_3: ${MERCADOPAGO_CHANNEL_TIER_3:-}
      MERCADOPAGO_CHANNEL_TIER_4: ${MERCADOPAGO_CHANNEL_TIER_4:-}
      MERCADOPAGO_CHANNEL_TIER_5: ${MERCADOPAGO_CHANNEL_TIER_5:-}
      MERCADOPAGO_CHANNEL_TIER_1_ANNUAL: ${MERCADOPAGO_CHANNEL_TIER_1_ANNUAL:-}
      MERCADOPAGO_CHANNEL_TIER_2_ANNUAL: ${MERCADOPAGO_CHANNEL_TIER_2_ANNUAL:-}
      MERCADOPAGO_CHANNEL_TIER_3_ANNUAL: ${MERCADOPAGO_CHANNEL_TIER_3_ANNUAL:-}
      MERCADOPAGO_CHANNEL_TIER_4_ANNUAL: ${MERCADOPAGO_CHANNEL_TIER_4_ANNUAL:-}
      MERCADOPAGO_CHANNEL_TIER_5_ANNUAL: ${MERCADOPAGO_CHANNEL_TIER_5_ANNUAL:-}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET:-}
      MERCADOPAGO_WEBHOOK_ALLOW_UNSIGNED: ${MERCADOPAGO_WEBHOOK_ALLOW_UNSIGNED:-}
      TRUST_PROXY: ${TRUST_PROXY:-}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-}
      EVOLUTION_WEBHOOK_TOKEN: ${EVOLUTION_WEBHOOK_TOKEN:-}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://evolution:8080}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-zapmass-secure-key-2026}
      ZAPMASS_WEBHOOK_URL: ${ZAPMASS_WEBHOOK_URL:-http://api:3001/webhook/evolution}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_PORT: ${S3_PORT:-}
      S3_USE_SSL: ${S3_USE_SSL:-true}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evolution-secure-pass-2026}
      # Opcional: scrape interno (rede Docker) sem token; localhost/público exigem Bearer se definido.
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      SUBSCRIPTION_ENFORCE: ${SUBSCRIPTION_ENFORCE:-true}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      # Resend (emails transacionais + respostas a sugestões): Swarm não repassa env_file ao contentor como o Compose —
      # estas variáveis têm de estar no .env da VPS E exportadas por deployment/vps-deploy.sh antes do stack deploy.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      SUGGESTION_NOTIFY_EMAIL: ${SUGGESTION_NOTIFY_EMAIL:-}
      NEW_CLIENT_NOTIFY_EMAIL: ${NEW_CLIENT_NOTIFY_EMAIL:-}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      # CORS + fallback do link /avaliacao se PUBLIC_APP_URL vazio — exportado por deployment/vps-deploy.sh.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      # WhatsApp Web bundle (getChat / LID / markedUnread); mesmo valor no .env da VPS — Swarm não usa env_file como Compose.
      WWEBJS_WEB_VERSION_URL: ${WWEBJS_WEB_VERSION_URL:-}
      # Sync Pipeline: emitir lista parcial durante getChats/Store — exportado em deployment/vps-deploy.sh antes do stack deploy.
      WA_SYNC_CONV_EMIT_EVERY: ${WA_SYNC_CONV_EMIT_EVERY:-}
      # 1 = puxar inbox do telefone ao conectar; 0 = só tempo real (campanhas, envios, mensagens recebidas).
      WA_FULL_INBOX_SYNC: ${WA_FULL_INBOX_SYNC:-1}
      # 1 (default): arquivar mensagens no Firestore (users/{uid}/waChatThreads) — Firebase Admin obrigatório.
      WA_CHAT_ARCHIVE: ${WA_CHAT_ARCHIVE:-1}
    env_file:
      - .env
    volumes:
      - zapmass-data:/app/data
      - ./secrets:/run/secrets:ro
    deploy:
      replicas: 1
      update_config:
        order: stop-first
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

  wa-worker:
    image: zapmass:latest
    command: ["./node_modules/.bin/tsx", "server/waWorker.ts"]
    # A imagem declara HEALTHCHECK curl :3001 (API); o worker não abre HTTP — sem isto Swarm fica em "starting" para sempre.
    healthcheck:
      disable: true
    # Chromium: no Swarm `shm_size` do Compose é ignorado — tmpfs em /dev/shm (~2GiB).
    volumes:
      - zapmass-data:/app/data
      - ./secrets:/run/secrets:ro
      - type: tmpfs
        target: /dev/shm
        tmpfs:
          size: 2147483648
    # shutdownAll espera ate ~15s por cliente + backup; mais folga que o default Swarm (~10s) evita SIGKILL a meio.
    stop_grace_period: 60s
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      SESSION_PROCESS_MODE: worker
      WORKER_ID: "{{.Task.Name}}"
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase-admin.json
      WWEBJS_WEB_VERSION_URL: ${WWEBJS_WEB_VERSION_URL:-}
      WA_SYNC_CONV_EMIT_EVERY: ${WA_SYNC_CONV_EMIT_EVERY:-}
      WA_FULL_INBOX_SYNC: ${WA_FULL_INBOX_SYNC:-1}
      WA_CHAT_ARCHIVE: ${WA_CHAT_ARCHIVE:-1}
    deploy:
      # Com API em monolith: 0. Com ZAPMASS_API_SESSION_MODE=api: use 1 ou mais (Chromium no worker).
      replicas: ${WA_WORKER_REPLICAS:-0}
      update_config:
        # Evita dois contentores ao mesmo tempo a usar o mesmo volume de sessoes (locks/corrupção).
        order: stop-first
        parallelism: 1
        delay: 15s
      restart_policy:
        condition: any
      resources:
        reservations:
          cpus: "0.25"

  evolution:
    image: atendai/evolution-api:v2.2.0
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
    environment:
      - SERVER_PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-zapmass-secure-key-2026}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=postgresql://postgres:${POSTGRES_PASSWORD:-evolution-secure-pass-2026}@postgres:5432/evolution_db?schema=public
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379/1
      - REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_LOCAL_ENABLED=false
      - WEBSOCKET_ENABLED=false
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - STORE_CONTACTS=true
      - STORE_CHATS=true
    volumes:
      - zapmass-evolution:/evolution/instances
    deploy:
      replicas: 1
      update_config:
        order: stop-first
      restart_policy:
        condition: on-failure

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=evolution_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-evolution-secure-pass-2026}
    volumes:
      - zapmass-postgres:/var/lib/postgresql/data
    deploy:
      replicas: 1
      update_config:
        order: stop-first
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis-data:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./deployment/swarm/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deployment/swarm/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    ports:
      - target: 9090
        published: ${PROMETHEUS_PORT:-9090}
        protocol: tcp
        mode: host
    deploy:
      replicas: 1

volumes:
  zapmass-data:
  zapmass-evolution:
  zapmass-postgres:
  redis-data:
