# Deploy automático:
# - Push em branches alvo dispara pipeline
# - Push/manual (workflow_dispatch) faz deploy imediato na VPS
# - Cron aplica pendentes respeitando a janela de madrugada (evita queda de canais no horario comercial)
# Configure os secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY.
# Opcional: VPS_SSH_PORT se o sshd nao estiver na porta 22.
#
# "dial tcp *:22: i/o timeout" = o runner NUNCA liga a TCP/SSH (antes de pedir chave). E rede/firewall.
#  - Hostinger/hPanel: regra de firewall para TCP 22 (ou a porta do sshd) a partir de qualquer IP,
#    ou nao restringir SSH a IP fixo — GitHub Actions usa IPs publicos variados.
#  - Na VPS: `sudo ufw allow 22/tcp` (ou a porta real); rever fail2ban se bloqueou.
#  - Secret VPS_HOST = IPv4 publico, sem espacos. Porta: VPS_SSH_PORT se nao for 22.
#  - O app abrir em :3001 nao implica que o :22 chegue da internet; teste: `nc -zv IP 22` de fora.
#
# Se "o deploy passou" mas a UI nao muda: em Docker Swarm, rebuild com tag :latest nem sempre
# recria tarefas. Este workflow corre `docker service update --force` em zapmass_api / wa-worker
# apos o stack deploy. Forçar a mao na VPS: `docker service update --force zapmass_api`.
#
# GitHub Actions: ações JS (checkout, etc.) migram de Node 20 → 24. Ver:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/

name: Build + deploy VPS

# O env FORCE_* fica so no job `build` (checkout + setup-node). O job `deploy` usa so appleboy/ssh-action; evita acoplar o mesmo runtime JS em todo o pipeline.
# No GitHub: se falhar, abra o run → veja o passo com X (build: npm; deploy: SSH; healthcheck: API 3001).
on:
  push:
    branches:
      - main
      - prod
      - principal
      - "produção"
    paths:
      - "src/**"
      - "server/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - "tsconfig*.json"
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-stack.yml"
      - "deployment/vps-deploy.sh"
      - ".github/workflows/deploy.yml"
      - ".env.example"
  schedule:
    # Roda a cada 30 min para aplicar deploy pendente na janela da madrugada.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref_name }}
  # Evita fila longa de runs "pendente": o mais novo cancela o anterior da mesma branch.
  cancel-in-progress: true

jobs:
  build:
    name: Validar build (Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          # Alinhar com o Dockerfile (node:22); Node 24 no CI pode quebrar deps nativos ou espelho npm.
          node-version: "22"
          cache: npm

      - name: Instalar e compilar
        env:
          # Evita download de browser no CI (o app usa Chromium do runtime Docker/VPS).
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: |
          set -euo pipefail
          node -v
          npm ci
          npm run build

  deploy:
    name: SSH + Docker (VPS)
    needs: build
    if: success()
    runs-on: ubuntu-latest
    # Build + deploy no host pode passar de 20 min em horários de pico.
    timeout-minutes: 60
    steps:
      - name: Pré-teste de conectividade SSH (runner -> VPS)
        continue-on-error: true
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          echo "==> teste TCP ${VPS_HOST}:${VPS_PORT}"
          ok=0
          for i in 1 2 3 4 5 6; do
            if nc -zvw5 "${VPS_HOST}" "${VPS_PORT}"; then
              echo "OK: porta SSH acessivel na tentativa ${i}."
              ok=1
              break
            fi
            echo "tentativa ${i} falhou; aguardando 5s..."
            sleep 5
          done
          if [ "${ok}" != "1" ]; then
            echo "::warning::Runner nao alcançou ${VPS_HOST}:${VPS_PORT} apos 6 tentativas."
            echo "::warning::Seguindo para tentativa real de SSH (pode ser oscilacao temporaria de rota)."
          fi

      - name: Deploy por SSH (tentativa 1)
        id: deploy_try_1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || '22' }}
          timeout: 3m
          command_timeout: 60m
          script: |
            set -euo pipefail
            export GITHUB_EVENT_NAME="${{ github.event_name }}"
            BRANCH="main"
            echo "==> branch alvo (forçado): ${BRANCH}"
            cd /opt/zapmass
            git fetch --all --prune
            git checkout "${BRANCH}" 2>/dev/null || git checkout -b "${BRANCH}" "origin/${BRANCH}"
            git reset --hard "origin/${BRANCH}"
            if [ ! -f deployment/vps-deploy.sh ]; then
              echo "ERRO: deployment/vps-deploy.sh ausente. Atualize o repositório na VPS (git pull)."
              exit 1
            fi
            chmod +x deployment/vps-deploy.sh
            exec bash deployment/vps-deploy.sh

      - name: Aguardar antes de nova tentativa SSH
        if: steps.deploy_try_1.outcome == 'failure'
        run: sleep 20

      - name: Deploy por SSH (tentativa 2)
        if: steps.deploy_try_1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || '22' }}
          timeout: 3m
          command_timeout: 60m
          script: |
            set -euo pipefail
            export GITHUB_EVENT_NAME="${{ github.event_name }}"
            BRANCH="main"
            echo "==> branch alvo (forçado): ${BRANCH}"
            cd /opt/zapmass
            git fetch --all --prune
            git checkout "${BRANCH}" 2>/dev/null || git checkout -b "${BRANCH}" "origin/${BRANCH}"
            git reset --hard "origin/${BRANCH}"
            chmod +x deployment/vps-deploy.sh
            exec bash deployment/vps-deploy.sh
