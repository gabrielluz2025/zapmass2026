# Deploy automático:
# - Push em branches alvo dispara pipeline
# - Push/manual (workflow_dispatch) faz deploy imediato na VPS
# - Cron aplica pendentes respeitando a janela de madrugada (evita queda de canais no horario comercial)
# Configure os secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY.
# Opcional: VPS_SSH_PORT se o sshd nao estiver na porta 22.
#
# "dial tcp *:22: i/o timeout" = o runner NUNCA liga a TCP/SSH (antes de pedir chave). E rede/firewall.
#  - Hostinger/hPanel: regra de firewall para TCP 22 (ou a porta do sshd) a partir de qualquer IP,
#    ou nao restringir SSH a IP fixo — GitHub Actions usa IPs publicos variados.
#  - Na VPS: `sudo ufw allow 22/tcp` (ou a porta real); rever fail2ban se bloqueou.
#  - Secret VPS_HOST = IPv4 publico, sem espacos. Porta: VPS_SSH_PORT se nao for 22.
#  - O app abrir em :3001 nao implica que o :22 chegue da internet; teste: `nc -zv IP 22` de fora.
#
# Se "o deploy passou" mas a UI nao muda: em Docker Swarm, rebuild com tag :latest nem sempre
# recria tarefas. Este workflow corre `docker service update --force` em zapmass_api / wa-worker
# apos o stack deploy. Forçar a mao na VPS: `docker service update --force zapmass_api`.
#
# GitHub Actions: ações JS (checkout, etc.) migram de Node 20 → 24. Ver:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/

name: Build + deploy VPS

# O env FORCE_* fica so no job `build` (checkout + setup-node). O job `deploy` usa so appleboy/ssh-action; evita acoplar o mesmo runtime JS em todo o pipeline.
# No GitHub: se falhar, abra o run → veja o passo com X (build: npm; deploy: SSH; healthcheck: API 3001).
on:
  push:
    branches:
      - main
      - prod
      - principal
      - "produção"
    paths:
      - "src/**"
      - "server/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - "tsconfig*.json"
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-stack.yml"
      - "deployment/**"
      - ".github/workflows/deploy.yml"
      - ".env.example"
  schedule:
    # Roda a cada 30 min para aplicar deploy pendente na janela da madrugada.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref_name }}
  # Evita fila longa de runs "pendente": o mais novo cancela o anterior da mesma branch.
  cancel-in-progress: true

jobs:
  build:
    name: Validar build (Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          # Alinhar com o Dockerfile (node:22); Node 24 no CI pode quebrar deps nativos ou espelho npm.
          node-version: "22"
          cache: npm

      - name: Instalar e compilar
        env:
          # Evita download de browser no CI (o app usa Chromium do runtime Docker/VPS).
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
        run: |
          set -euo pipefail
          node -v
          npm ci
          npm run build

  deploy:
    name: SSH + Docker (VPS)
    needs: build
    if: success()
    runs-on: ubuntu-latest
    # VPS lenta: dois `npm ci` no Docker + Vite + stack + health 200 pode passar 1h+.
    # 60m matava o job com build ainda a correr (appleboy/ssh-action).
    timeout-minutes: 150
    steps:
      - name: Pré-teste de conectividade SSH (runner -> VPS)
        continue-on-error: true
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          echo "==> teste TCP ${VPS_HOST}:${VPS_PORT}"
          ok=0
          for i in 1 2 3 4 5 6; do
            if nc -zvw5 "${VPS_HOST}" "${VPS_PORT}"; then
              echo "OK: porta SSH acessivel na tentativa ${i}."
              ok=1
              break
            fi
            echo "tentativa ${i} falhou; aguardando 5s..."
            sleep 5
          done
          if [ "${ok}" != "1" ]; then
            echo "::warning::Runner nao alcançou ${VPS_HOST}:${VPS_PORT} apos 6 tentativas."
            echo "::warning::Seguindo para tentativa real de SSH (pode ser oscilacao temporaria de rota)."
          fi

      - name: Deploy por SSH (tentativa 1)
        id: deploy_try_1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || '22' }}
          timeout: 5m
          command_timeout: 140m
          script: |
            set -euo pipefail
            export GITHUB_EVENT_NAME="${{ github.event_name }}"
            GHA_SHA="${{ github.sha }}"
            GHA_REF_NAME="${{ github.ref_name }}"
            echo "==> deploy: commit = ${GHA_SHA} (o mesmo que o job build testou) ref = ${GHA_REF_NAME}"
            cd /opt/zapmass
            git fetch --all --prune
            if ! git rev-parse --verify -q "${GHA_SHA}^{commit}" >/dev/null; then
              echo "==> commit ainda não no clone; a tentar fetch completo (shallow?)"
              git fetch --unshallow 2>/dev/null || git fetch --depth=500 origin 2>/dev/null || true
            fi
            if ! git rev-parse --verify -q "${GHA_SHA}^{commit}" >/dev/null; then
              echo "ERRO: commit ${GHA_SHA} inacessível após fetch. Em /opt/zapmass: git fetch --all e confira a rede."
              exit 1
            fi
            git checkout -f "${GHA_SHA}"
            if [ ! -f deployment/vps-deploy.sh ]; then
              echo "ERRO: deployment/vps-deploy.sh ausente. Atualize o repositório na VPS (git pull)."
              exit 1
            fi
            chmod +x deployment/vps-deploy.sh
            exec bash deployment/vps-deploy.sh

      - name: Aguardar antes de nova tentativa SSH
        if: steps.deploy_try_1.outcome == 'failure'
        run: sleep 20

      - name: Deploy por SSH (tentativa 2)
        id: deploy_try_2
        if: steps.deploy_try_1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || '22' }}
          timeout: 5m
          command_timeout: 140m
          script: |
            set -euo pipefail
            export GITHUB_EVENT_NAME="${{ github.event_name }}"
            GHA_SHA="${{ github.sha }}"
            GHA_REF_NAME="${{ github.ref_name }}"
            echo "==> deploy: commit = ${GHA_SHA} (o mesmo que o job build testou) ref = ${GHA_REF_NAME}"
            cd /opt/zapmass
            git fetch --all --prune
            if ! git rev-parse --verify -q "${GHA_SHA}^{commit}" >/dev/null; then
              echo "==> commit ainda não no clone; a tentar fetch completo (shallow?)"
              git fetch --unshallow 2>/dev/null || git fetch --depth=500 origin 2>/dev/null || true
            fi
            if ! git rev-parse --verify -q "${GHA_SHA}^{commit}" >/dev/null; then
              echo "ERRO: commit ${GHA_SHA} inacessível após fetch."
              exit 1
            fi
            git checkout -f "${GHA_SHA}"
            chmod +x deployment/vps-deploy.sh
            exec bash deployment/vps-deploy.sh

      # O GitHub mostra o job vermelho pelo último passo que falhou (muitas vezes só o log do ssh-action).
      # Isto adiciona texto legível no separador "Summary" da execução.
      - name: Resumo — se o deploy SSH falhou (o git / push costuma estar certo)
        if: failure()
        run: |
          {
            echo "## Falha no deploy (ligação à VPS)"
            echo ""
            echo "O **repositório e o push para o GitHub estão OK** — o problema é **entre o servidor da GitHub e a tua VPS** (rede/firewall/porta)."
            echo ""
            echo "| Sintoma | O que fazer |"
            echo "|---------|--------------|"
            echo "| \`dial tcp ... connection timed out\` | Firewall (Hostinger/VPS): permitir **TCP porta 22** (ou a porta do SSH) para **internet** — os IPs da GitHub Actions **mudam**; não bloquear só ao teu IP |"
            echo "| Porta SSH não é 22 | Secret \`VPS_SSH_PORT\` no repositório com a porta certa |"
            echo "| \`VPS_HOST\` | IPv4 **público** da VPS, sem espaços |"
            echo ""
            echo "No run, abre também o passo **Validar build (Vite)** — se estiver verde, o código compilou; falhou só o **SSH + Docker**."
            echo ""
            echo "Depois de corrigir rede/firewall: **Actions → Re-run failed jobs**."
          } >> "$GITHUB_STEP_SUMMARY"
