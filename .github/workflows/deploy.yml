# Deploy automático:
# - Push em branches alvo dispara pipeline
# - Push/manual (workflow_dispatch) faz deploy imediato na VPS
# - Cron aplica pendentes respeitando a janela de madrugada (evita queda de canais no horario comercial)
# Configure os secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY.
# Opcional: variável de repositório `VITE_GA_MEASUREMENT_ID` (Settings → Secrets and variables → Actions → Variables)
# para o job de CI compilar o front com o mesmo ID GA4 que usará na VPS (.env).
# Opcional: VPS_SSH_PORT se o sshd nao estiver na porta 22.
#
# "dial tcp *:22: i/o timeout" = o runner NUNCA liga a TCP/SSH (antes de pedir chave). E rede/firewall.
#  - Hostinger/hPanel: regra de firewall para TCP 22 (ou a porta do sshd) a partir de qualquer IP,
#    ou nao restringir SSH a IP fixo — GitHub Actions usa IPs publicos variados.
#  - Na VPS: `sudo ufw allow 22/tcp` (ou a porta real); rever fail2ban se bloqueou.
#  - Secret VPS_HOST = IPv4 publico, sem espacos. Porta: VPS_SSH_PORT se nao for 22.
#  - O app abrir em :3001 nao implica que o :22 chegue da internet; teste: `nc -zv IP 22` de fora.
#
# Se "o deploy passou" mas a UI nao muda: em Docker Swarm, rebuild com tag :latest nem sempre
# recria tarefas. Este workflow corre `docker service update --force` em zapmass_api / wa-worker
# apos o stack deploy. Forçar a mao na VPS: `docker service update --force zapmass_api`.
#
# GitHub Actions: ações JS (checkout, etc.) migram de Node 20 → 24. Ver:
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/

name: Build + deploy VPS

# O env FORCE_* fica so no job `build` (checkout + setup-node). O job `deploy` usa so appleboy/ssh-action; evita acoplar o mesmo runtime JS em todo o pipeline.
# No GitHub: se falhar, abra o run → veja o passo com X (build: npm; deploy: SSH; healthcheck: API 3001).
on:
  push:
    branches:
      - main
      - prod
      - principal
      - "produção"
    paths:
      - "shared/**"
      - "src/**"
      - "docs/**"
      - "server/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - "tsconfig*.json"
      - "vitest.config.ts"
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-stack.yml"
      - "deployment/**"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/recover-vps.yml"
      - ".env.example"
      - "CHANGELOG.md"
      - "VERSION"
  schedule:
    # Só na madrugada UTC (evita deploy a cada 30 min falhar de dia).
    - cron: "0,30 0-4 * * *"
  workflow_dispatch: {}

# IMPORTANTE: NÃO usar cancel-in-progress:true aqui.
# Este workflow também corre em schedule (*/30 min). Um novo run (cron ou segundo push)
# cancelava o deploy SSH em curso após ~30 min — o job ficava "Cancelado" mesmo com VPS OK.
# Com false: o run seguinte espera na fila até o deploy atual terminar (sem corridas à VPS).
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Validar build (Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          # Alinhar com o Dockerfile (node:22); Node 24 no CI pode quebrar deps nativos ou espelho npm.
          node-version: "22"
          cache: npm

      - name: Instalar e compilar
        env:
          # Evita download de browser no CI (o app usa Chromium do runtime Docker/VPS).
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID }}
        run: |
          set -euo pipefail
          node -v
          npm ci
          npm run typecheck
          npm run test
          npm run build

  deploy:
    name: SSH + Docker (VPS)
    needs: build
    if: success()
    runs-on: ubuntu-latest
    # VPS lenta: dois `npm ci` no Docker + Vite + stack + health 200 pode passar 1h+.
    # 60m matava o job com build ainda a correr (appleboy/ssh-action).
    timeout-minutes: 150
    steps:
      - name: Janela cron (UTC 00–05)
        id: cron_window
        if: github.event_name == 'schedule'
        run: |
          h=$(date -u +%H)
          if [ "$h" -lt 6 ]; then
            echo "within=true" >> "$GITHUB_OUTPUT"
          else
            echo "within=false" >> "$GITHUB_OUTPUT"
            echo "## Deploy cron ignorado (fora da janela 00:00–05:59 UTC)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fora da janela — sem SSH
        if: github.event_name == 'schedule' && steps.cron_window.outputs.within == 'false'
        run: echo "==> Cron fora da janela UTC; deploy na VPS adiado (sem tentativa SSH)."

      - name: Produção já no commit? (pula SSH)
        id: prod_already
        if: github.event_name != 'schedule' || steps.cron_window.outputs.within == 'true'
        run: |
          set -euo pipefail
          EXPECTED="${GITHUB_SHA::7}"
          resp=$(curl -sf --max-time 12 https://zap-mass.com/api/health 2>/dev/null || echo "")
          if [ -n "${resp}" ] && echo "${resp}" | grep -q '"status":"ok"'; then
            ver=$(echo "${resp}" | sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1 || true)
            echo "producao version=${ver:-?} esperado=${EXPECTED}"
            if [ -n "${ver}" ] && { [ "${ver}" = "${EXPECTED}" ] || [ "${ver}" = "${GITHUB_SHA}" ]; }; then
              echo "already=true" >> "$GITHUB_OUTPUT"
              echo "## Produção já está em \`${ver}\` — deploy SSH dispensado" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "already=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pré-teste de conectividade SSH (runner -> VPS)
        id: ssh_precheck
        if: >-
          (github.event_name != 'schedule' || steps.cron_window.outputs.within == 'true') &&
          steps.prod_already.outputs.already != 'true'
        continue-on-error: true
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          echo "==> teste TCP ${VPS_HOST}:${VPS_PORT}"
          ok=0
          for i in $(seq 1 20); do
            if nc -zvw8 "${VPS_HOST}" "${VPS_PORT}"; then
              echo "OK: porta SSH acessivel na tentativa ${i}."
              ok=1
              break
            fi
            echo "tentativa ${i}/20 falhou; aguardando 10s..."
            sleep 10
          done
          if [ "${ok}" = "1" ]; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Runner nao alcancou ${VPS_HOST}:${VPS_PORT} apos 20 tentativas (~200s)."
            echo "::warning::O deploy SSH ainda pode funcionar (nc no runner e falho na Hostinger)."
          fi

      - name: VPS — deploy (build + health na mesma sessao SSH)
        id: deploy_vps
        if: >-
          (github.event_name != 'schedule' || steps.cron_window.outputs.within == 'true') &&
          steps.prod_already.outputs.already != 'true' &&
          steps.ssh_precheck.outputs.reachable == 'true'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || '22' }}
          timeout: 45m
          command_timeout: 150m
          script: |
            set -euo pipefail
            export GITHUB_EVENT_NAME="${{ github.event_name }}"
            export GITHUB_ACTIONS=true
            export ZAPMASS_DEPLOY_SKIP_HEALTHCHECK=1
            export BUILDKIT_MAX_PARALLELISM="${BUILDKIT_MAX_PARALLELISM:-1}"
            export DEPLOY_HEALTH_TRIES=200
            export DEPLOY_HEALTH_INITIAL_WAIT=60
            GHA_SHA="${{ github.sha }}"
            echo "==> deploy commit=${GHA_SHA}"
            cd /opt/zapmass
            git fetch --all --prune
            if ! git rev-parse --verify -q "${GHA_SHA}^{commit}" >/dev/null; then
              git fetch --unshallow 2>/dev/null || git fetch --depth=500 origin 2>/dev/null || true
            fi
            git checkout -f "${GHA_SHA}"
            export VITE_GIT_REF="$(git rev-parse --short HEAD 2>/dev/null || echo '')"
            export GHA_SHA
            chmod +x deployment/vps-deploy.sh deployment/gha-healthcheck.sh
            _log="/tmp/zapmass-gha-deploy-$$.log"
            set +e
            bash deployment/vps-deploy.sh 2>&1 | tee "${_log}"
            _build="${PIPESTATUS[0]}"
            set -e
            if [ "${_build}" != "0" ]; then
              echo "::error::vps-deploy.sh terminou com codigo ${_build}"
              echo "==> ultimas linhas do deploy:"
              tail -n 60 "${_log}" || true
              echo "==> docker service ps zapmass_api (se Swarm):"
              docker service ps zapmass_api --no-trunc 2>/dev/null | head -8 || true
              docker service logs --tail 40 zapmass_api 2>/dev/null || true
              exit "${_build}"
            fi
            echo "==> build/stack OK — healthcheck longo"
            bash deployment/gha-healthcheck.sh

      - name: SSH indisponível — aguardar deploy na VPS (cron/manual)
        if: >-
          always() &&
          (github.event_name != 'schedule' || steps.cron_window.outputs.within == 'true') &&
          steps.ssh_precheck.outputs.reachable != 'true'
        run: |
          {
            echo "## SSH bloqueado — deploy via cron na VPS"
            echo ""
            echo "O runner do GitHub **não alcança a porta SSH** (firewall Hostinger)."
            echo "Se o cron \`zapmass-watch-deploy\` estiver instalado, a VPS puxa o código em até **3 minutos**."
            echo ""
            echo "**Uma vez na VPS** (terminal do painel Hostinger):"
            echo '```bash'
            echo "cd /opt/zapmass && git pull origin main && sudo bash deployment/install-deploy-watch-cron.sh && bash deployment/manual-pull-deploy.sh"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verificar versao em producao (evita retry desnecessario)
        id: verify_prod
        if: >-
          always() &&
          (github.event_name != 'schedule' || steps.cron_window.outputs.within == 'true') &&
          (steps.deploy_vps.outcome == 'failure' || steps.deploy_vps.outcome == 'skipped')
        run: |
          set -euo pipefail
          EXPECTED="${GITHUB_SHA::7}"
          SSH_SKIPPED="${{ steps.ssh_precheck.outputs.reachable != 'true' }}"
          if [ "${SSH_SKIPPED}" = "true" ]; then
            echo "==> SSH indisponivel; aguardando deploy na VPS (cron/manual) ate ${EXPECTED}..."
            MAX_TRIES=90
            SLEEP_SEC=30
          else
            echo "==> SSH reportou falha; conferindo se producao ja esta em ${EXPECTED}..."
            MAX_TRIES=12
            SLEEP_SEC=10
          fi
          verified=0
          for i in $(seq 1 "${MAX_TRIES}"); do
            resp=$(curl -sf --max-time 12 https://zap-mass.com/api/health 2>/dev/null || echo "")
            if [ -n "${resp}" ] && echo "${resp}" | grep -q '"status":"ok"'; then
              ver=$(echo "${resp}" | sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1 || true)
              echo "tentativa ${i}/${MAX_TRIES}: version=${ver:-?} esperado=${EXPECTED}"
              if [ -n "${ver}" ] && { [ "${ver}" = "${EXPECTED}" ] || [ "${ver}" = "${GITHUB_SHA}" ]; }; then
                verified=1
                break
              fi
            else
              echo "tentativa ${i}/${MAX_TRIES}: health indisponivel"
            fi
            sleep "${SLEEP_SEC}"
          done
          if [ "${verified}" = "1" ]; then
            echo "verified=true" >> "$GITHUB_OUTPUT"
            echo "## Deploy confirmado em producao (version=${ver})" >> "$GITHUB_STEP_SUMMARY"
            if [ "${SSH_SKIPPED}" = "true" ]; then
              echo "==> Producao atualizada via cron/manual na VPS."
            else
              echo "==> Producao ja no commit certo — pulando retries SSH."
            fi
          else
            echo "verified=false" >> "$GITHUB_OUTPUT"
            if [ "${SSH_SKIPPED}" = "true" ]; then
              echo "==> Versao ainda nao confere apos aguardar cron/manual."
            else
              echo "==> Versao em producao ainda nao confere; aguardando 60s antes do retry SSH..."
              sleep 60
            fi
          fi

      - name: VPS — deploy retry SSH (2)
        id: deploy_vps_retry
        if: >-
          always() &&
          (github.event_name != 'schedule' || steps.cron_window.outputs.within == 'true') &&
          steps.deploy_vps.outcome == 'failure' &&
          steps.verify_prod.outputs.verified != 'true'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || '22' }}
          timeout: 45m
          command_timeout: 150m
          script: |
            set -euo pipefail
            export GITHUB_EVENT_NAME="${{ github.event_name }}"
            export GITHUB_ACTIONS=true
            export ZAPMASS_DEPLOY_SKIP_HEALTHCHECK=1
            export BUILDKIT_MAX_PARALLELISM="${BUILDKIT_MAX_PARALLELISM:-1}"
            export DEPLOY_HEALTH_TRIES=200
            export DEPLOY_HEALTH_INITIAL_WAIT=60
            GHA_SHA="${{ github.sha }}"
            echo "==> deploy RETRY commit=${GHA_SHA}"
            cd /opt/zapmass
            git fetch --all --prune
            git checkout -f "${GHA_SHA}"
            export VITE_GIT_REF="$(git rev-parse --short HEAD 2>/dev/null || echo '')"
            export GHA_SHA
            chmod +x deployment/vps-deploy.sh deployment/gha-healthcheck.sh
            _log="/tmp/zapmass-gha-deploy-retry-$$.log"
            set +e
            bash deployment/vps-deploy.sh 2>&1 | tee "${_log}"
            _build="${PIPESTATUS[0]}"
            set -e
            if [ "${_build}" != "0" ]; then
              tail -n 60 "${_log}" || true
              exit "${_build}"
            fi
            bash deployment/gha-healthcheck.sh

      - name: Aguardar retry SSH (3)
        if: >-
          always() &&
          (github.event_name != 'schedule' || steps.cron_window.outputs.within == 'true') &&
          steps.deploy_vps.outcome == 'failure' &&
          steps.verify_prod.outputs.verified != 'true' &&
          steps.deploy_vps_retry.outcome == 'failure'
        run: |
          echo "==> Segundo retry SSH falhou. Terceira tentativa em 60s…"
          sleep 60

      - name: VPS — deploy retry SSH (3)
        id: deploy_vps_retry2
        if: >-
          always() &&
          (github.event_name != 'schedule' || steps.cron_window.outputs.within == 'true') &&
          steps.deploy_vps.outcome == 'failure' &&
          steps.verify_prod.outputs.verified != 'true' &&
          steps.deploy_vps_retry.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || '22' }}
          timeout: 45m
          command_timeout: 150m
          script: |
            set -euo pipefail
            export GITHUB_EVENT_NAME="${{ github.event_name }}"
            export GITHUB_ACTIONS=true
            export ZAPMASS_DEPLOY_SKIP_HEALTHCHECK=1
            export BUILDKIT_MAX_PARALLELISM="${BUILDKIT_MAX_PARALLELISM:-1}"
            export DEPLOY_HEALTH_TRIES=200
            export DEPLOY_HEALTH_INITIAL_WAIT=60
            GHA_SHA="${{ github.sha }}"
            echo "==> deploy RETRY 3 commit=${GHA_SHA}"
            cd /opt/zapmass
            git fetch --all --prune
            git checkout -f "${GHA_SHA}"
            export VITE_GIT_REF="$(git rev-parse --short HEAD 2>/dev/null || echo '')"
            export GHA_SHA
            chmod +x deployment/vps-deploy.sh deployment/gha-healthcheck.sh
            _log="/tmp/zapmass-gha-deploy-retry3-$$.log"
            set +e
            bash deployment/vps-deploy.sh 2>&1 | tee "${_log}"
            _build="${PIPESTATUS[0]}"
            set -e
            if [ "${_build}" != "0" ]; then
              tail -n 60 "${_log}" || true
              exit "${_build}"
            fi
            bash deployment/gha-healthcheck.sh

      - name: Verificar versao em producao (pos-retries)
        id: verify_prod_final
        if: >-
          always() &&
          (github.event_name != 'schedule' || steps.cron_window.outputs.within == 'true') &&
          steps.verify_prod.outputs.verified != 'true' &&
          steps.deploy_vps.outcome == 'failure' &&
          !(steps.deploy_vps_retry.outcome == 'success' || steps.deploy_vps_retry2.outcome == 'success')
        run: |
          set -euo pipefail
          EXPECTED="${GITHUB_SHA::7}"
          echo "==> Ultima conferencia de versao em producao (${EXPECTED})..."
          for i in $(seq 1 12); do
            resp=$(curl -sf --max-time 12 https://zap-mass.com/api/health 2>/dev/null || echo "")
            if [ -n "${resp}" ] && echo "${resp}" | grep -q '"status":"ok"'; then
              ver=$(echo "${resp}" | sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1 || true)
              echo "tentativa ${i}/12: version=${ver:-?}"
              if [ -n "${ver}" ] && { [ "${ver}" = "${EXPECTED}" ] || [ "${ver}" = "${GITHUB_SHA}" ]; }; then
                echo "verified=true" >> "$GITHUB_OUTPUT"
                echo "## Deploy confirmado em producao apos retries (version=${ver})" >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
            fi
            sleep 15
          done
          echo "verified=false" >> "$GITHUB_OUTPUT"

      - name: Falhar job se SSH/deploy falhou
        if: >-
          always() &&
          steps.prod_already.outputs.already != 'true' &&
          (github.event_name != 'schedule' || steps.cron_window.outputs.within == 'true') &&
          steps.verify_prod.outputs.verified != 'true' &&
          steps.verify_prod_final.outputs.verified != 'true' &&
          !(steps.deploy_vps.outcome == 'success' || steps.deploy_vps_retry.outcome == 'success' || steps.deploy_vps_retry2.outcome == 'success')
        run: |
          echo "::error::Deploy nao confirmado em producao. SSH bloqueado ou script na VPS falhou."
          echo "::error::Na VPS (terminal Hostinger): cd /opt/zapmass && git pull origin main && sudo bash deployment/install-deploy-watch-cron.sh && bash deployment/manual-pull-deploy.sh"
          exit 1

      # O GitHub mostra o job vermelho pelo último passo que falhou (muitas vezes só o log do ssh-action).
      # Isto adiciona texto legível no separador "Summary" da execução.
      - name: Tag de versão automática após deploy bem-sucedido
        if: >-
          (success() || steps.prod_already.outputs.already == 'true' || steps.verify_prod.outputs.verified == 'true' || steps.verify_prod_final.outputs.verified == 'true') &&
          (github.event_name != 'schedule' || steps.cron_window.outputs.within == 'true') &&
          (steps.prod_already.outputs.already == 'true' || steps.deploy_vps.outcome == 'success' || steps.deploy_vps_retry.outcome == 'success' || steps.deploy_vps_retry2.outcome == 'success' || steps.verify_prod.outputs.verified == 'true' || steps.verify_prod_final.outputs.verified == 'true')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "")
          if [ -z "$VERSION" ]; then exit 0; fi
          TAG="v${VERSION}-build-$(date +%Y%m%d%H%M)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Deploy automático $TAG — commit ${{ github.sha }}" || true
          git push origin "$TAG" 2>/dev/null || true
          echo "## ✅ Deploy bem-sucedido" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Campo | Valor |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Versão | \`${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`${TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Resumo — se o deploy SSH falhou (o git / push costuma estar certo)
        if: failure()
        run: |
          {
            echo "## Falha no deploy (ligação à VPS)"
            echo ""
            echo "O **repositório e o push para o GitHub estão OK** — o problema é **entre o servidor da GitHub e a tua VPS** (rede/firewall/porta)."
            echo ""
            echo "| Sintoma | O que fazer |"
            echo "|---------|--------------|"
            echo "| \`dial tcp ... connection timed out\` | **TCP não chega** à VPS antes do SSH/chave — não é problema de commit. Firewall (painel Hostinger/hPanel): regra permitindo **SSH (TCP)** de **qualquer IP** (0.0.0.0/0) — restringir só ao teu IP **bloqueia** os runners do GitHub. Na VPS: \`sudo ufw allow 22/tcp\` (ou a porta do \`sshd\`); rever fail2ban. |"
            echo "| \`connect: connection timed out\` (mensagem igual) | Mesmo tratamento que o erro acima. Testar de fora: \`nc -zv IP 22\` ou \`Test-NetConnection IP -Port 22\` (Windows). |"
            echo "| Porta SSH não é 22 | Secret \`VPS_SSH_PORT\` no repositório com a porta certa |"
            echo "| \`VPS_HOST\` | IPv4 **público** da VPS, sem espaços |"
            echo "| SSH funciona do teu PC mas falha no GitHub | Confirma que o firewall **não** limita SSH ao teu IP fixo; os runners usam IPs variáveis. |"
            echo ""
            echo "### Deploy manual até o runner conseguir ligar à VPS"
            echo "Abre SSH **do teu computador ou terminal do painel** (tem de chegar à VPS mesmo que o GitHub não chegue)."
            echo '```bash'
            echo "cd /opt/zapmass && bash deployment/manual-pull-deploy.sh"
            echo '```'
            echo "O script usa ensure-git-main (main = origin/main) e deployment/vps-deploy.sh, como esta pipeline."
            echo ""
            echo "Alternativa estável ao longo prazo: [GitHub runner self-hosted](https://docs.github.com/en/actions/hosting-your-own-runners/about-self-hosted-runners) **na VPS** — o runner liga para fora aos servidores da GitHub, sem precisares de porta SSH entrada para Actions."
            echo ""
            echo "No run, abre também o passo **Validar build (Vite)** — se estiver verde, o código compilou; falhou só o **SSH + Docker**."
            echo ""
            echo "Depois de corrigir rede/firewall: **Actions → Re-run failed jobs** (ou um novo push)."
          } >> "$GITHUB_STEP_SUMMARY"
