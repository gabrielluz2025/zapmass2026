# ZapMass — produção em Docker
#
# VPS (recomendado — instala Docker, .env, build e sobe):
#   sudo bash deployment/bootstrap-docker-vps.sh https://github.com/SEU_USUARIO/SEU_REPO.git
#
# Ou, com o código já na pasta:
#   sudo bash deployment/instalar-docker-servidor.sh
#
# Manual: cp .env.example .env, ajuste ALLOWED_ORIGINS e HOST_PORT, depois:
#   docker compose up -d --build
#
# GA4: com VITE_GA_MEASUREMENT_ID=G-… no `.env`, o `docker compose up --build` embute o gtag no bundle.
#
# Porta publicada: HOST_PORT no .env (padrão 3001). Libere essa porta no firewall da VPS.
# Dados: volume zapmass-data → /app/data (sessão WhatsApp e filas persistem no servidor).
#
# Compose 2.24+: env_file com required:false. Em versões antigas: crie .env antes do up.

services:
  zapmass:
    build:
      context: .
      # VITE_* precisa estar disponivel no build do frontend (Vite "cozinha" no bundle).
      # Valores vem do .env da VPS via interpolacao do docker compose.
      args:
        VITE_ADMIN_EMAILS: ${VITE_ADMIN_EMAILS:-}
        VITE_MARKETING_PRICE_MONTHLY: ${VITE_MARKETING_PRICE_MONTHLY:-}
        VITE_MARKETING_PRICE_ANNUAL: ${VITE_MARKETING_PRICE_ANNUAL:-}
        VITE_ENFORCE_SUBSCRIPTION: ${VITE_ENFORCE_SUBSCRIPTION:-true}
        VITE_CREATOR_STUDIO: ${VITE_CREATOR_STUDIO:-}
        # Na VPS: `export VITE_GIT_REF=$(git rev-parse --short HEAD)` antes do up --build, ou o workflow de deploy define.
        VITE_GIT_REF: ${VITE_GIT_REF:-unknown}
        # GA4 opcional — incorporado no bundle pelo Vite (ver .env.example).
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
    init: true
    ports:
      - "${HOST_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # Alinhar com docker-stack: ZAPMASS_API_SESSION_MODE=api + profile workers para testar split local
      SESSION_PROCESS_MODE: ${ZAPMASS_API_SESSION_MODE:-monolith}
      # Repasse explícito (Compose lê o .env ao lado deste ficheiro para interpolar ${…}).
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MERCADOPAGO_BACK_URL: ${MERCADOPAGO_BACK_URL:-}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET:-}
      MERCADOPAGO_WEBHOOK_ALLOW_UNSIGNED: ${MERCADOPAGO_WEBHOOK_ALLOW_UNSIGNED:-}
      TRUST_PROXY: ${TRUST_PROXY:-}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-}
      EVOLUTION_WEBHOOK_TOKEN: ${EVOLUTION_WEBHOOK_TOKEN:-}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-http://evolution:8080}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-zapmass-secure-key-2026}
      ZAPMASS_WEBHOOK_URL: ${ZAPMASS_WEBHOOK_URL:-http://zapmass:3001/webhook/evolution}
      ZAPMASS_WHATSAPP_ENGINE: ${ZAPMASS_WHATSAPP_ENGINE:-evolution}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_PORT: ${S3_PORT:-}
      S3_USE_SSL: ${S3_USE_SSL:-true}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      SUGGESTION_NOTIFY_EMAIL: ${SUGGESTION_NOTIFY_EMAIL:-}
      NEW_CLIENT_NOTIFY_EMAIL: ${NEW_CLIENT_NOTIFY_EMAIL:-}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      # Credenciais Firebase Admin (service account). Coloca o JSON em
      # /opt/zapmass/secrets/firebase-admin.json no host (chmod 600).
      # Se o ficheiro nao existir, o servidor sobe na mesma mas rotas que
      # precisam de Firestore (trial, billing, admin) retornam 503.
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase-admin.json
      # Login funcionários (usuário/senha); ver .env.example
      FIREBASE_WEB_API_KEY: ${FIREBASE_WEB_API_KEY:-}
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
      MAX_STAFF_PASSWORD_ACCOUNTS: ${MAX_STAFF_PASSWORD_ACCOUNTS:-}
      SUBSCRIPTION_ENFORCE: ${SUBSCRIPTION_ENFORCE:-true}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      WWEBJS_WEB_VERSION_URL: ${WWEBJS_WEB_VERSION_URL:-}
    env_file:
      - path: .env
        required: false
    volumes:
      - zapmass-data:/app/data
      - ./secrets:/run/secrets:ro
    restart: unless-stopped
    shm_size: "2gb"
    # Da tempo para o Node/whatsapp-web.js fechar o Chromium com graca e
    # flushar a sessao no volume antes do SIGKILL (default seria 10s).
    # 45s = 15s per-client destroy + 5s backup + folga para o Node finalizar
    # e tirar backup de multiplas sessoes em paralelo.
    stop_grace_period: 45s
    depends_on:
      - redis
      - evolution
      - postgres

  evolution:
    image: atendai/evolution-api:v2.2.0
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-zapmass-secure-key-2026}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=postgresql://postgres:${POSTGRES_PASSWORD:-evolution-secure-pass-2026}@postgres:5432/evolution_db?schema=public
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379/1
      - REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_LOCAL_ENABLED=false
      - WEBSOCKET_ENABLED=false
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - STORE_CONTACTS=true
      - STORE_CHATS=true
      - CONFIG_SESSION_PHONE_VERSION=${CONFIG_SESSION_PHONE_VERSION:-2.3000.1035712111}
      - CONFIG_SESSION_PHONE_CLIENT=${CONFIG_SESSION_PHONE_CLIENT:-ZapMass}
      - CONFIG_SESSION_PHONE_NAME=${CONFIG_SESSION_PHONE_NAME:-Chrome}
      - LOG_LEVEL=${EVOLUTION_LOG_LEVEL:-ERROR}
      - NODE_OPTIONS=--dns-result-order=ipv4first
    volumes:
      - zapmass-evolution:/evolution/instances
    depends_on:
      - redis
      - postgres

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=evolution_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-evolution-secure-pass-2026}
    volumes:
      - zapmass-postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    restart: unless-stopped
    volumes:
      - zapmass-redis:/data

  wa-worker:
    build:
      context: .
      args:
        VITE_ADMIN_EMAILS: ${VITE_ADMIN_EMAILS:-}
        VITE_MARKETING_PRICE_MONTHLY: ${VITE_MARKETING_PRICE_MONTHLY:-}
        VITE_MARKETING_PRICE_ANNUAL: ${VITE_MARKETING_PRICE_ANNUAL:-}
        VITE_ENFORCE_SUBSCRIPTION: ${VITE_ENFORCE_SUBSCRIPTION:-true}
        VITE_CREATOR_STUDIO: ${VITE_CREATOR_STUDIO:-}
        VITE_GIT_REF: ${VITE_GIT_REF:-unknown}
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
    command: ["./node_modules/.bin/tsx", "server/waWorker.ts"]
    init: true
    # Imagem HEALTHCHECK usa :3001 (API); o worker não escuta HTTP.
    healthcheck:
      disable: true
    shm_size: "2gb"
    stop_grace_period: 60s
    environment:
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SESSION_PROCESS_MODE: worker
      WORKER_ID: worker-compose
      WWEBJS_WEB_VERSION_URL: ${WWEBJS_WEB_VERSION_URL:-}
    env_file:
      - path: .env
        required: false
    volumes:
      - zapmass-data:/app/data
      - ./secrets:/run/secrets:ro
    depends_on:
      - redis
    restart: unless-stopped
    profiles: ["workers"]

volumes:
  zapmass-data:
  zapmass-redis:
  zapmass-evolution:
  zapmass-postgres:
