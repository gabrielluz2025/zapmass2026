# Configuração nginx para ZapMass
# Instalar: cp deployment/nginx-zapmass.conf /etc/nginx/sites-available/zapmass
#           ln -sf /etc/nginx/sites-available/zapmass /etc/nginx/sites-enabled/zapmass
#           rm -f /etc/nginx/sites-enabled/default
#           nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name zap-mass.com www.zap-mass.com zap.mass.com www.zap.mass.com;

    # Tamanho máximo de upload (mídia WhatsApp)
    client_max_body_size 64M;

    # Timeouts maiores para conexões longas (webhooks, Socket.IO)
    proxy_connect_timeout       60s;
    proxy_send_timeout          300s;
    proxy_read_timeout          300s;

    location / {
        proxy_pass http://127.0.0.1:3001;

        proxy_http_version 1.1;

        # WebSocket / Socket.IO
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers padrão de proxy
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Desabilitar buffering para Server-Sent Events / streaming
        proxy_buffering off;
    }
}
