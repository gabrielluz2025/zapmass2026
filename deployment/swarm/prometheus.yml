global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: "zapmass-api"
    static_configs:
      - targets: ["api:3001"]
    metrics_path: /metrics
    # Scrape vem da rede interna do Swarm (rede do serviço `api`); metricsAccess deixa passar tráfego 10/172.x.
