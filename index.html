<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Evita index.html em cache (SPA): sem isto, o browser pode apontar para .js antigo e "nada mudou". -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>ZapMass — Disparos em massa no WhatsApp com organização</title>
    <meta name="description" content="Centralize campanhas, base de contatos e atendimento no WhatsApp. Teste grátis com Google, planos por canal, Pix com desconto e operação na nuvem 24/7." />
    <meta property="og:title" content="ZapMass — Disparos em massa no WhatsApp com organização" />
    <meta property="og:description" content="Centralize campanhas, base de contatos e atendimento no WhatsApp. Teste grátis com Google, planos por canal, Pix com desconto e operação na nuvem 24/7." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <!-- Origem da API (REST + Socket). `VITE_API_ORIGIN` no build tem prioridade; esta meta cobre Firebase sem .env no build.
         Self-host com outro backend: remova ou altere o content. -->
    <!-- Deixe vazio em self-host (mesma origem). Firebase: https://sua-api ou use VITE_API_ORIGIN no build. -->
    <meta name="zapmass-api-origin" content="" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23059669'/%3E%3Cpath d='M20 20l24 0 0 16-12 0-8 8 0-8-4 0z' fill='white'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#059669" />
  </head>
  <body>
    <!-- Aplica modo escuro antes do React montar — evita flash de tela branca -->
    <script>
      (function() {
        try {
          var mode = localStorage.getItem('zapmass.mode') || 'dark';
          document.documentElement.setAttribute('data-mode', mode);
        } catch(e) {
          document.documentElement.setAttribute('data-mode', 'dark');
        }
      })();
    </script>
    <!-- app-mount: árvore React. portal-root: modais (fora da sub-árvore do mount, mas sob #root — menos conflitos com o body). -->
    <div id="root">
      <div id="app-mount"></div>
      <div id="portal-root"></div>
    </div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
